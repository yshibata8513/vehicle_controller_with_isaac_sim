# Sedan vehicle definition. Mirrors src/vehicle_rl/assets/sedan.py and the
# sedan URDF; values must stay in sync until PR 2 wires this YAML through a
# factory that replaces SEDAN_CFG.
schema_version: 1
name: sedan

asset:
  usd_path: assets/usd/sedan.usd
  prim_path_train: /World/envs/env_.*/Sedan
  prim_path_single: /World/Sedan

joints:
  steer_regex: front_(left|right)_steer_joint
  wheel_regex: (front|rear)_(left|right)_wheel_joint
  base_body: base_link
  wheel_order: [FL, FR, RL, RR]

geometry:
  wheelbase_m: 2.7
  track_m: 1.55
  wheel_radius_m: 0.33
  wheel_width_m: 0.225
  cog_z_m: 0.55
  # Symmetric weight distribution: front-axle distance from CoG = wheelbase / 2.
  a_front_m: 1.35

mass:
  total_kg: 1500.0

steering:
  # URDF revolute joint limit (~35 deg). pinion_max = delta_max_rad * steering_ratio.
  delta_max_rad: 0.611
  steering_ratio: 16.0

physx:
  rigid_body:
    max_linear_velocity: 100.0
    max_angular_velocity: 100.0
    max_depenetration_velocity: 10.0
    enable_gyroscopic_forces: true
  articulation:
    enabled_self_collisions: false
    solver_position_iteration_count: 8
    solver_velocity_iteration_count: 1
    sleep_threshold: 0.005
    stabilization_threshold: 0.001
  actuators:
    steer:
      stiffness: 8000.0
      damping: 400.0
      effort_limit_sim: 500.0
      velocity_limit_sim: 3.0
      friction: 0.1
    wheels:
      stiffness: 0.0
      damping: 0.0
      effort_limit_sim: 400.0
      velocity_limit_sim: 200.0
      friction: 0.0
