# Random-path generator config (Phase 3 random-path training).
# One file is shared across Phase 1 (random_long) / Phase 2 (random_bank) /
# Phase 3 (bank regeneration). Sections unused by the active phase are
# silently ignored. See docs/phase3_random_path_plan.md.

generator:
  seed: 12345
  ds: 0.2                         # Path arc-length spacing [m]; must match TrackingEnvCfg.course_ds.
  target_speed: 10.0              # Legacy / fallback. Random paths use the per-segment sample from `speed`.

speed:
  v_min: 5.0                      # [m/s] Lower bound of per-segment uniform sample.
  v_max: 12.0                     # [m/s] Upper bound (before curvature cap).
  ay_limit: 4.0                   # [m/s^2] Lateral-accel limit -> v_curve_limit = sqrt(ay_limit / |kappa|).
  segment_constant: true          # true: v held constant within a segment.
  max_resample_attempts: 50       # if v_curve_limit < v_min, re-sample segment geometry up to this many times before falling back to v_min.

segments:
  straight_length_m: [10.0, 80.0]      # uniform sample range
  min_radius_m: 30.0                   # tightest curvature: |kappa| <= 1 / min_radius_m
  max_radius_m: 150.0                  # gentlest curvature
  turn_heading_change_rad: [0.2, 1.2]  # whole-turn heading change [rad], uniformly sampled
  clothoid_heading_fraction: [0.25, 0.55]  # share of heading carried by the clothoid pair (rest -> arc)
  straight_probability: 0.25
  turn_probability: 0.75               # straight_probability + turn_probability == 1.0
  reverse_turn_probability: 0.35       # given a turn, prob the next turn flips sign

projection:
  search_radius_samples: 80       # half-window for local argmin (full window = 2W+1 = 161 samples)
  recovery_radius_samples: 400    # large fallback (Phase 1 is logging-only; not yet used at runtime)
  max_index_jump_samples: 120     # diagnostic threshold: |delta_idx| > this counts as a violation

reset:
  # NOTE: random_reset_along_path lives in TrackingEnvCfg (env reset
  # distribution is not a path-geometry property; it applies to built-in
  # courses too). Override via CLI / env_cfg, not here.
  end_margin_extra_m: 20.0        # extra safety on top of episode_horizon + lookahead

phase1_long_path:
  length_m: 20000.0               # 20 km open path; >> v_max * episode_length_s
  is_loop: false

phase2_bank:
  num_paths: 1024
  length_m: 1000.0
  is_loop: false

phase3_regeneration:
  enabled: false
  interval_resets: 5000
  fraction: 0.05
  min_unused_slots: 16
