# E2E guard: short circle rollout used by docs/refactor_e2e_guard.md
# to verify the YAML refactor is bit-equivalent to the pre-refactor CLI.
# duration is 2 s -- intentionally short, not for performance evaluation.
schema_version: 1
kind: classical

seed: null
run_name: circle_refactor_guard

vehicle_ref: configs/vehicles/sedan.yaml
dynamics_ref: configs/dynamics/linear_friction_circle_flat.yaml
course_ref: configs/courses/circle.yaml
controllers:
  lateral_ref: configs/controllers/pure_pursuit.yaml
  longitudinal_ref: configs/controllers/speed_pi.yaml
runtime_ref: configs/runtime/local_paths.yaml

run:
  duration_s: 2.0
  off_track_threshold_m: 1.0
  plan_K: 20
  projection_search_radius_samples: 80
  video:
    enabled: false
